name: macOS CI

on:
  push:
    branches:
      - main
      - unified
      - ammarshah1n/**
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Build release
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Typecheck Edge Functions
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_DIR="$HOME/.deno"
          export PATH="$DENO_DIR/bin:$PATH"
          for fn in supabase/functions/*/index.ts; do
            echo "Checking $fn..."
            deno check --no-lock "$fn" || exit 1
          done

      - name: Package app
        run: bash scripts/package_app.sh

      - name: Verify packaged app exists
        run: test -d dist.noindex/Timed.app

      - name: Upload app bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: timed-app
          path: dist.noindex/Timed.app
