name: macOS CI

on:
  push:
    branches:
      - main
      - unified
      - ammarshah1n/**
  pull_request:

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Build release
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Install CI tools
        run: brew install deno xcodegen

      - name: Verify Edge Function dependency lock
        run: |
          cd supabase/functions
          for fn in */index.ts; do
            echo "Verifying locked dependencies for $fn..."
            deno cache --frozen "$fn" || exit 1
          done

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build TimedMac Xcode target
        run: |
          xcodebuild -project Timed.xcodeproj \
            -scheme TimedMac \
            -configuration Release \
            -destination 'platform=macOS,arch=arm64' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            ARCHS=arm64 ONLY_ACTIVE_ARCH=YES CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build TimediOS Xcode target
        run: |
          xcodebuild -project Timed.xcodeproj \
            -scheme TimediOS \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app
        run: bash scripts/package_app.sh

      - name: Verify packaged app exists
        run: test -d dist.noindex/Timed.app

      - name: Upload app bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: timed-app
          path: dist.noindex/Timed.app
