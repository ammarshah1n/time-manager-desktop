name: macOS CI

on:
  push:
    branches:
      - main
      - ammarshah1n/**
  pull_request:

jobs:
  build-test-package:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Run tests
        run: swift test

      - name: Package app
        run: bash scripts/package_app.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: timed-app
          path: dist/timed.app
