# fly.toml — graphiti-mcp MCP server
#
# Deploy:
#   cd services/graphiti-mcp
#   fly launch --no-deploy --copy-config       # first time only
#   fly secrets set \
#       GRAPHITI_MCP_TOKEN=<generate-256-bit-token> \
#       NEO4J_URI=bolt+s://<host>:7687 \
#       NEO4J_USER=neo4j \
#       NEO4J_PASSWORD=<secret> \
#       GRAPHITI_URL=http://timed-graphiti.internal:8000 \
#       SUPABASE_URL=https://fpmjuufefhtlwbfinxlx.supabase.co \
#       SUPABASE_SERVICE_ROLE_KEY=<secret>
#   fly deploy

app = "timed-graphiti-mcp"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  GRAPHITI_SNAPSHOT_BUCKET = "kg-snapshots"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
