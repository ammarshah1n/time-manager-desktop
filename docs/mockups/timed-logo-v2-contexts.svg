<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Wallpaper-ish background — Big Sur soft grey, no gradient noise -->
  <rect width="1600" height="900" fill="#E5E5EA"/>

  <!-- ── Top row: icon at 3 scales over light background ──────────────────── -->
  <g transform="translate(120 120)">
    <text x="0" y="-24" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#3C3C43" letter-spacing="0.4" text-transform="uppercase">SCALE</text>

    <!-- 256 -->
    <g transform="translate(0 0)">
      <use href="#mark" transform="scale(0.25)" />
      <text x="0" y="280" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#8E8E93">256</text>
    </g>
    <!-- 128 -->
    <g transform="translate(320 60)">
      <use href="#mark" transform="scale(0.125)" />
      <text x="0" y="156" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#8E8E93">128</text>
    </g>
    <!-- 64 -->
    <g transform="translate(500 100)">
      <use href="#mark" transform="scale(0.0625)" />
      <text x="0" y="84" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#8E8E93">64</text>
    </g>
    <!-- 32 -->
    <g transform="translate(610 124)">
      <use href="#mark" transform="scale(0.03125)" />
      <text x="0" y="46" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#8E8E93">32</text>
    </g>
  </g>

  <!-- ── Mid row: dark mode preview ───────────────────────────────────────── -->
  <g transform="translate(800 60)">
    <text x="0" y="36" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#3C3C43" letter-spacing="0.4">DARK MODE</text>
    <rect x="0" y="60" width="640" height="280" rx="32" fill="#1C1C1E"/>
    <g transform="translate(80 100)">
      <use href="#mark" transform="scale(0.1953125)" />
    </g>
    <g transform="translate(280 152)">
      <use href="#mark" transform="scale(0.09765625)" />
    </g>
    <g transform="translate(420 188)">
      <use href="#mark" transform="scale(0.0625)" />
    </g>
    <g transform="translate(520 212)">
      <use href="#mark" transform="scale(0.046875)" />
    </g>
  </g>

  <!-- ── Bottom: macOS Dock-style strip with neighbour icons ─────────────── -->
  <g transform="translate(120 520)">
    <text x="0" y="-24" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#3C3C43" letter-spacing="0.4">DOCK CONTEXT</text>

    <!-- Dock material -->
    <rect x="0" y="0" width="1360" height="160" rx="40" fill="#FFFFFF" fill-opacity="0.66"/>
    <rect x="0" y="0" width="1360" height="160" rx="40" stroke="#000000" stroke-opacity="0.08"/>

    <!-- Placeholder neighbour icons: Calendar, Reminders, Mail, Notes, Clock — drawn as squircle silhouettes so the eye reads "system app row" without copying real Apple icons -->
    <!-- Calendar-like (white card + red header bar + "26") -->
    <g transform="translate(40 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
      <rect width="104" height="22" rx="24" fill="#FF3B30"/>
      <rect y="0" width="104" height="22" fill="#FF3B30"/>
      <rect y="14" width="104" height="8" fill="#FF3B30"/>
      <text x="52" y="80" font-family="-apple-system, system-ui, sans-serif" font-size="44" font-weight="700" text-anchor="middle" fill="#1C1C1E">26</text>
    </g>
    <!-- Reminders-like (3 list lines + bullet dots in a circle) -->
    <g transform="translate(180 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
      <circle cx="34" cy="36" r="5" fill="#FF3B30"/>
      <line x1="46" y1="36" x2="80" y2="36" stroke="#1C1C1E" stroke-width="3" stroke-linecap="round"/>
      <circle cx="34" cy="56" r="5" fill="#FF9500"/>
      <line x1="46" y1="56" x2="74" y2="56" stroke="#1C1C1E" stroke-width="3" stroke-linecap="round"/>
      <circle cx="34" cy="76" r="5" fill="#34C759"/>
      <line x1="46" y1="76" x2="78" y2="76" stroke="#1C1C1E" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Mail-like -->
    <g transform="translate(320 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
      <rect x="20" y="34" width="64" height="40" rx="6" fill="#FFFFFF" stroke="#1C1C1E" stroke-width="3"/>
      <path d="M20 38 L52 60 L84 38" stroke="#1C1C1E" stroke-width="3" fill="none"/>
    </g>
    <!-- Notes-like -->
    <g transform="translate(460 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
      <line x1="22" y1="36" x2="82" y2="36" stroke="#1C1C1E" stroke-width="3" stroke-linecap="round"/>
      <line x1="22" y1="52" x2="82" y2="52" stroke="#1C1C1E" stroke-width="3" stroke-linecap="round"/>
      <line x1="22" y1="68" x2="68" y2="68" stroke="#1C1C1E" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Settings-like (gears) -->
    <g transform="translate(600 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
      <circle cx="52" cy="52" r="22" stroke="#1C1C1E" stroke-width="4" fill="none"/>
      <circle cx="52" cy="52" r="8" fill="#1C1C1E"/>
    </g>

    <!-- TIMED icon — actual mark, full size 104×104 -->
    <g transform="translate(740 28)">
      <use href="#mark" transform="scale(0.1015625)" />
    </g>

    <!-- More neighbour silhouettes to balance -->
    <g transform="translate(880 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
    </g>
    <g transform="translate(1020 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
    </g>
    <g transform="translate(1160 28)">
      <rect width="104" height="104" rx="24" fill="#FFFFFF" stroke="#000000" stroke-opacity="0.08"/>
    </g>
  </g>

  <!-- Mark definition (1024×1024 viewbox content, scalable via use+scale) -->
  <defs>
    <symbol id="mark" viewBox="0 0 1024 1024" width="1024" height="1024" overflow="visible">
      <rect x="0" y="0" width="1024" height="1024" rx="224" fill="#FFFFFF"/>
      <rect x="2" y="2" width="1020" height="1020" rx="222" stroke="#000000" stroke-opacity="0.06" stroke-width="2"/>
      <g transform="translate(512 512)">
        <g stroke="#1C1C1E" stroke-linecap="round">
          <line x1="0" y1="-352" x2="0" y2="-320" stroke-width="14"/>
          <line x1="352" y1="0" x2="320" y2="0" stroke-width="14"/>
          <line x1="0" y1="352" x2="0" y2="320" stroke-width="14"/>
          <line x1="-352" y1="0" x2="-320" y2="0" stroke-width="14"/>
          <line x1="176.0" y1="-304.8" x2="160.0" y2="-277.1" stroke-width="10"/>
          <line x1="304.8" y1="-176.0" x2="277.1" y2="-160.0" stroke-width="10"/>
          <line x1="304.8" y1="176.0"  x2="277.1" y2="160.0"  stroke-width="10"/>
          <line x1="176.0" y1="304.8"  x2="160.0" y2="277.1"  stroke-width="10"/>
          <line x1="-176.0" y1="304.8" x2="-160.0" y2="277.1" stroke-width="10"/>
          <line x1="-304.8" y1="176.0" x2="-277.1" y2="160.0" stroke-width="10"/>
          <line x1="-304.8" y1="-176.0" x2="-277.1" y2="-160.0" stroke-width="10"/>
          <line x1="-176.0" y1="-304.8" x2="-160.0" y2="-277.1" stroke-width="10"/>
        </g>
        <line x1="0" y1="0" x2="-226.6" y2="100.9" stroke="#1C1C1E" stroke-width="22" stroke-linecap="round"/>
        <line x1="0" y1="0" x2="-146.2" y2="-54.4" stroke="#1C1C1E" stroke-width="28" stroke-linecap="round"/>
        <circle cx="0" cy="0" r="26" fill="#FF3B30"/>
      </g>
    </symbol>
  </defs>
</svg>
