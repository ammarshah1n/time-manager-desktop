<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Squircle shell — pure white, hairline border. Apple Clock / Reminders / Settings disciplined. -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="#FFFFFF"/>
  <rect x="2" y="2" width="1020" height="1020" rx="222" stroke="#000000" stroke-opacity="0.06" stroke-width="2"/>

  <!-- Clock face. All geometry centered at (512, 512). Outer radius 384. -->
  <g transform="translate(512 512)">
    <!-- Hour markers: 4 long at cardinals, 8 short at off-positions. SF-Pro hairline weight. -->
    <g stroke="#1C1C1E" stroke-linecap="round">
      <!-- Long cardinals (12, 3, 6, 9) — 32px long, 10px wide -->
      <line x1="0" y1="-352" x2="0" y2="-320" stroke-width="14"/>
      <line x1="352" y1="0" x2="320" y2="0" stroke-width="14"/>
      <line x1="0" y1="352" x2="0" y2="320" stroke-width="14"/>
      <line x1="-352" y1="0" x2="-320" y2="0" stroke-width="14"/>

      <!-- Short ticks at 1, 2, 4, 5, 7, 8, 10, 11 — 16px long, 8px wide -->
      <!-- 1 o'clock: angle 30°  → (sin30, -cos30) = (0.500, -0.866) -->
      <line x1="176.0" y1="-304.8" x2="160.0" y2="-277.1" stroke-width="10"/>
      <!-- 2 o'clock: angle 60°  → (0.866, -0.500) -->
      <line x1="304.8" y1="-176.0" x2="277.1" y2="-160.0" stroke-width="10"/>
      <!-- 4 o'clock: angle 120° → (0.866,  0.500) -->
      <line x1="304.8" y1="176.0"  x2="277.1" y2="160.0"  stroke-width="10"/>
      <!-- 5 o'clock: angle 150° → (0.500,  0.866) -->
      <line x1="176.0" y1="304.8"  x2="160.0" y2="277.1"  stroke-width="10"/>
      <!-- 7 o'clock: angle 210° → (-0.500, 0.866) -->
      <line x1="-176.0" y1="304.8"  x2="-160.0" y2="277.1"  stroke-width="10"/>
      <!-- 8 o'clock: angle 240° → (-0.866, 0.500) -->
      <line x1="-304.8" y1="176.0"  x2="-277.1" y2="160.0"  stroke-width="10"/>
      <!-- 10 o'clock: angle 300°→ (-0.866,-0.500) -->
      <line x1="-304.8" y1="-176.0" x2="-277.1" y2="-160.0" stroke-width="10"/>
      <!-- 11 o'clock: angle 330°→ (-0.500,-0.866) -->
      <line x1="-176.0" y1="-304.8" x2="-160.0" y2="-277.1" stroke-width="10"/>
    </g>

    <!-- Hands at 9:41 (Apple's canonical keynote time).
         Minute hand: 41 min → angle 246° from 12 clockwise → vec (-0.914,  0.407). Length 248. End (-226.6,  100.9)
         Hour hand:   9.683h → angle 290.49° from 12 clockwise → vec (-0.937, -0.349). Length 156. End (-146.2,  -54.4) -->
    <line x1="0" y1="0" x2="-226.6" y2="100.9" stroke="#1C1C1E" stroke-width="22" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-146.2" y2="-54.4" stroke="#1C1C1E" stroke-width="28" stroke-linecap="round"/>

    <!-- BucketDot — the single accent. Apple system red. -->
    <circle cx="0" cy="0" r="26" fill="#FF3B30"/>
  </g>
</svg>
